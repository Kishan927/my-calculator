<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e11;
      --surface: #18181d;
      --panel: #1f1f27;
      --border: #2e2e3a;
      --accent: #c8f55a;
      --accent-dim: #9dbb43;
      --text: #f0f0f5;
      --text-sub: #888897;
      --op-bg: #252530;
      --op-hover: #2e2e3e;
      --radius: 18px;
      --btn-radius: 14px;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Mono', monospace;
      overflow: hidden;
    }

    /* background grain texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* glow blob behind calc */
    body::after {
      content: '';
      position: fixed;
      width: 420px;
      height: 420px;
      background: radial-gradient(circle, rgba(200,245,90,0.08) 0%, transparent 70%);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
    }

    .calculator {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      width: 340px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03) inset,
        0 40px 80px rgba(0,0,0,0.6),
        0 2px 4px rgba(0,0,0,0.5);
    }

    /* --- Display --- */
    .display {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 20px 16px;
      margin-bottom: 20px;
      min-height: 110px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-end;
      gap: 6px;
      overflow: hidden;
    }

    .expression {
      font-size: 13px;
      color: var(--text-sub);
      letter-spacing: 0.03em;
      height: 18px;
      transition: opacity 0.2s;
      text-align: right;
      word-break: break-all;
    }

    .result {
      font-family: 'Syne', sans-serif;
      font-size: 42px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -2px;
      line-height: 1;
      transition: font-size 0.15s ease;
      text-align: right;
      word-break: break-all;
    }

    .result.shrink { font-size: 28px; letter-spacing: -1px; }
    .result.tiny   { font-size: 20px; letter-spacing: 0; }

    /* --- Button Grid --- */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      appearance: none;
      border: none;
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      font-size: 16px;
      font-weight: 500;
      border-radius: var(--btn-radius);
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.08s ease, background 0.12s ease, box-shadow 0.12s ease;
      position: relative;
      overflow: hidden;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    button:active { transform: scale(0.93); }

    /* ripple */
    button::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0; left: 0;
      background: rgba(255,255,255,0.06);
      opacity: 0;
      transition: opacity 0.2s;
    }
    button:active::after { opacity: 1; }

    /* Number / default */
    .btn-num {
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
      box-shadow: 0 2px 0 rgba(0,0,0,0.4), 0 1px 0 rgba(255,255,255,0.04) inset;
    }
    .btn-num:hover { background: var(--op-bg); }

    /* Operators */
    .btn-op {
      background: var(--op-bg);
      color: var(--accent);
      border: 1px solid rgba(200,245,90,0.15);
      box-shadow: 0 2px 0 rgba(0,0,0,0.4);
    }
    .btn-op:hover { background: var(--op-hover); border-color: rgba(200,245,90,0.3); }

    /* Utility: AC, +/-, % */
    .btn-util {
      background: #252530;
      color: var(--text-sub);
      border: 1px solid var(--border);
      box-shadow: 0 2px 0 rgba(0,0,0,0.4);
    }
    .btn-util:hover { background: #2e2e3e; color: var(--text); }

    /* Equals */
    .btn-eq {
      background: var(--accent);
      color: #0e0e11;
      font-weight: 700;
      font-size: 20px;
      border: none;
      box-shadow: 0 2px 0 var(--accent-dim), 0 6px 20px rgba(200,245,90,0.25);
    }
    .btn-eq:hover { background: #d4f870; box-shadow: 0 2px 0 var(--accent-dim), 0 8px 28px rgba(200,245,90,0.35); }

    /* Zero spans 2 cols */
    .span2 { grid-column: span 2; justify-content: flex-start; padding-left: 22px; }

    /* Label tag */
    .tag {
      position: absolute;
      top: 16px;
      left: 20px;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-sub);
      opacity: 0.5;
    }

    /* flash animation on equals */
    @keyframes flash {
      0%   { opacity: 1; }
      50%  { opacity: 0.5; }
      100% { opacity: 1; }
    }
    .flash { animation: flash 0.18s ease; }
  </style>
</head>
<body>
<div class="calculator">
  <span class="tag">CALC-01</span>
  <div class="display">
    <div class="expression" id="expression"></div>
    <div class="result" id="result">0</div>
  </div>

  <div class="grid">
    <!-- Row 1 -->
    <button class="btn-util" data-action="clear">AC</button>
    <button class="btn-util" data-action="sign">+/−</button>
    <button class="btn-util" data-action="percent">%</button>
    <button class="btn-op"   data-action="op" data-val="÷">÷</button>

    <!-- Row 2 -->
    <button class="btn-num" data-action="digit" data-val="7">7</button>
    <button class="btn-num" data-action="digit" data-val="8">8</button>
    <button class="btn-num" data-action="digit" data-val="9">9</button>
    <button class="btn-op"  data-action="op"    data-val="×">×</button>

    <!-- Row 3 -->
    <button class="btn-num" data-action="digit" data-val="4">4</button>
    <button class="btn-num" data-action="digit" data-val="5">5</button>
    <button class="btn-num" data-action="digit" data-val="6">6</button>
    <button class="btn-op"  data-action="op"    data-val="−">−</button>

    <!-- Row 4 -->
    <button class="btn-num" data-action="digit" data-val="1">1</button>
    <button class="btn-num" data-action="digit" data-val="2">2</button>
    <button class="btn-num" data-action="digit" data-val="3">3</button>
    <button class="btn-op"  data-action="op"    data-val="+">+</button>

    <!-- Row 5 -->
    <button class="btn-num span2" data-action="digit" data-val="0">0</button>
    <button class="btn-num" data-action="decimal">.</button>
    <button class="btn-eq"  data-action="equals">=</button>
  </div>
</div>

<script>
  const resultEl    = document.getElementById('result');
  const expressionEl = document.getElementById('expression');

  let current   = '0';
  let previous  = '';
  let operator  = null;
  let justCalc  = false;

  function updateDisplay() {
    resultEl.textContent = format(current);
    const len = resultEl.textContent.length;
    resultEl.classList.toggle('shrink', len > 9);
    resultEl.classList.toggle('tiny',   len > 14);
  }

  function format(val) {
    const n = parseFloat(val);
    if (isNaN(n)) return val;
    // show up to 10 sig figs, strip trailing zeros
    let s = parseFloat(n.toPrecision(10)).toString();
    if (s.length > 15) s = parseFloat(n.toExponential(6)).toString();
    return s;
  }

  function toNum(op) {
    return { '÷': '/', '×': '*', '−': '-', '+': '+' }[op] || op;
  }

  function handleDigit(val) {
    if (justCalc) { current = val; justCalc = false; }
    else current = current === '0' ? val : current + val;
    updateDisplay();
  }

  function handleOp(val) {
    if (operator && !justCalc) calculate(false);
    previous = current;
    operator = val;
    justCalc = true;
    expressionEl.textContent = format(previous) + ' ' + val;
  }

  function calculate(final = true) {
    if (!operator || previous === '') return;
    const a = parseFloat(previous);
    const b = parseFloat(current);
    let res;
    switch (operator) {
      case '÷': res = b === 0 ? 'Error' : a / b; break;
      case '×': res = a * b; break;
      case '−': res = a - b; break;
      case '+': res = a + b; break;
    }
    if (final) {
      expressionEl.textContent = format(previous) + ' ' + operator + ' ' + format(current) + ' =';
      resultEl.classList.add('flash');
      setTimeout(() => resultEl.classList.remove('flash'), 200);
      operator = null;
      previous = '';
    }
    current = res === 'Error' ? 'Error' : String(parseFloat(res.toPrecision(12)));
    justCalc = true;
    updateDisplay();
  }

  function handleClear() {
    current = '0'; previous = ''; operator = null; justCalc = false;
    expressionEl.textContent = '';
    updateDisplay();
  }

  function handleSign() {
    if (current === '0' || current === 'Error') return;
    current = String(-parseFloat(current));
    updateDisplay();
  }

  function handlePercent() {
    if (current === 'Error') return;
    current = String(parseFloat(current) / 100);
    updateDisplay();
  }

  function handleDecimal() {
    if (justCalc) { current = '0'; justCalc = false; }
    if (!current.includes('.')) current += '.';
    updateDisplay();
  }

  document.querySelector('.grid').addEventListener('click', e => {
    const btn = e.target.closest('button');
    if (!btn) return;
    const { action, val } = btn.dataset;
    if (action === 'digit')   handleDigit(val);
    if (action === 'op')      handleOp(val);
    if (action === 'equals')  calculate(true);
    if (action === 'clear')   handleClear();
    if (action === 'sign')    handleSign();
    if (action === 'percent') handlePercent();
    if (action === 'decimal') handleDecimal();
  });

  // Keyboard support
  document.addEventListener('keydown', e => {
    if (e.key >= '0' && e.key <= '9') handleDigit(e.key);
    else if (e.key === '+') handleOp('+');
    else if (e.key === '-') handleOp('−');
    else if (e.key === '*') handleOp('×');
    else if (e.key === '/') { e.preventDefault(); handleOp('÷'); }
    else if (e.key === '.' || e.key === ',') handleDecimal();
    else if (e.key === 'Enter' || e.key === '=') calculate(true);
    else if (e.key === 'Escape') handleClear();
    else if (e.key === 'Backspace') {
      if (current.length > 1 && !justCalc) { current = current.slice(0,-1); updateDisplay(); }
      else { current = '0'; updateDisplay(); }
    }
    else if (e.key === '%') handlePercent();
  });
</script>
</body>
</html>
